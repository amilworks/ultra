name: Deploy Platform Manually

on:
  workflow_dispatch:
    inputs:
      action:
        description: Platform action to run
        required: true
        default: up
        type: choice
        options:
          - config
          - up
          - down
          - logs

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ULTRA_DEPLOY_ROOT: ${{ vars.ULTRA_DEPLOY_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync platform assets
        env:
          DEPLOY_TARGET: ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          DEPLOY_ROOT="${ULTRA_DEPLOY_ROOT:-/srv/ultra}"
          ssh "$DEPLOY_TARGET" "mkdir -p '$DEPLOY_ROOT/platform-release/${GITHUB_SHA}' '$DEPLOY_ROOT/ops'"
          rsync -az platform/bisque "$DEPLOY_TARGET:$DEPLOY_ROOT/platform-release/${GITHUB_SHA}/platform/"
          rsync -az scripts/deploy_platform_manual.sh "$DEPLOY_TARGET:$DEPLOY_ROOT/platform-release/${GITHUB_SHA}/scripts/"
          rsync -az scripts/deploy_platform_manual.sh "$DEPLOY_TARGET:$DEPLOY_ROOT/ops/"

      - name: Run platform action
        env:
          DEPLOY_TARGET: ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          DEPLOY_ROOT="${ULTRA_DEPLOY_ROOT:-/srv/ultra}"
          ssh "$DEPLOY_TARGET" "chmod +x '$DEPLOY_ROOT/platform-release/${GITHUB_SHA}/scripts/deploy_platform_manual.sh' && sudo ENV_FILE='/etc/ultra/platform.env' '$DEPLOY_ROOT/platform-release/${GITHUB_SHA}/scripts/deploy_platform_manual.sh' '${{ github.event.inputs.action }}'"
