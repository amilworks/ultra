name: Verify Ultra Backend

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
    paths:
      - "src/**"
      - "bqapi/**"
      - "docker/codeexec/**"
      - "third_party/yolov5/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".env.example"
      - "scripts/deploy_ultra_backend.sh"
      - ".github/workflows/deploy-ultra-backend.yml"
  pull_request:
    paths:
      - "src/**"
      - "bqapi/**"
      - "docker/codeexec/**"
      - "third_party/yolov5/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".env.example"
      - "scripts/deploy_ultra_backend.sh"
      - ".github/workflows/deploy-ultra-backend.yml"

concurrency:
  group: verify-ultra-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v6

      - name: Sync backend environment
        run: uv sync --frozen

      - name: Compile backend modules
        run: |
          uv run python -m py_compile \
            src/config.py \
            src/agno_backend/runtime.py \
            src/api/main.py \
            src/tools.py

      - name: Run focused backend tests
        run: |
          uv run --with pytest python -m pytest \
            tests/test_pro_mode_opus_runtime.py \
            tests/test_bisque_oidc_user_reconciliation.py \
            -q
