name: Platform Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        description: Platform action to run
        required: true
        default: up
        type: choice
        options:
          - config
          - up
          - down
          - logs

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ULTRA_DEPLOY_ROOT: ${{ vars.ULTRA_DEPLOY_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLATFORM_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PLATFORM_DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if [ -n "${{ secrets.PLATFORM_DEPLOY_SSH_JUMP_HOST }}" ]; then
            cat <<EOF > ~/.ssh/config
Host platform-target
  HostName ${{ secrets.PLATFORM_DEPLOY_SSH_HOST }}
  User ${{ secrets.PLATFORM_DEPLOY_SSH_USER }}
  ProxyJump ${{ secrets.PLATFORM_DEPLOY_SSH_JUMP_HOST }}
EOF
            chmod 600 ~/.ssh/config
          fi

      - name: Sync platform assets
        run: |
          DEPLOY_ROOT="${ULTRA_DEPLOY_ROOT:-/srv/ultra}"
          if [ -n "${{ secrets.PLATFORM_DEPLOY_SSH_JUMP_HOST }}" ]; then
            DEPLOY_TARGET="platform-target"
          else
            DEPLOY_TARGET="${{ secrets.PLATFORM_DEPLOY_SSH_USER }}@${{ secrets.PLATFORM_DEPLOY_SSH_HOST }}"
          fi
          ssh "$DEPLOY_TARGET" "mkdir -p '$DEPLOY_ROOT/platform-releases/${GITHUB_SHA}' '$DEPLOY_ROOT/ops'"
          rsync -az platform/bisque "$DEPLOY_TARGET:$DEPLOY_ROOT/platform-releases/${GITHUB_SHA}/platform/"
          rsync -az deploy "$DEPLOY_TARGET:$DEPLOY_ROOT/platform-releases/${GITHUB_SHA}/"
          rsync -az scripts/deploy_platform_manual.sh scripts/render_production_templates.py "$DEPLOY_TARGET:$DEPLOY_ROOT/platform-releases/${GITHUB_SHA}/scripts/"
          ssh "$DEPLOY_TARGET" "ln -sfn '$DEPLOY_ROOT/platform-releases/${GITHUB_SHA}' '$DEPLOY_ROOT/platform-current'"
          rsync -az scripts/deploy_platform_manual.sh "$DEPLOY_TARGET:$DEPLOY_ROOT/ops/"

      - name: Run platform action
        run: |
          DEPLOY_ROOT="${ULTRA_DEPLOY_ROOT:-/srv/ultra}"
          if [ -n "${{ secrets.PLATFORM_DEPLOY_SSH_JUMP_HOST }}" ]; then
            DEPLOY_TARGET="platform-target"
          else
            DEPLOY_TARGET="${{ secrets.PLATFORM_DEPLOY_SSH_USER }}@${{ secrets.PLATFORM_DEPLOY_SSH_HOST }}"
          fi
          ssh "$DEPLOY_TARGET" "chmod +x '$DEPLOY_ROOT/platform-current/scripts/deploy_platform_manual.sh' && sudo ENV_FILE='/etc/ultra/platform.env' PLATFORM_DEPLOY_MODE='platform-node' '$DEPLOY_ROOT/platform-current/scripts/deploy_platform_manual.sh' '${{ github.event.inputs.action }}'"
