services:
  bisque:
    ports: !override
      - "${PLATFORM_BIND_HOST:-127.0.0.1}:${BISQUE_PORT:-8080}:8080"
      - "${PLATFORM_BIND_HOST:-127.0.0.1}:${BISQUE_ENGINE_PORT:-27000}:27000"
    volumes: !override
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PLATFORM_DATA_ROOT:?set PLATFORM_DATA_ROOT in platform.env}/bisque-config:/source/config
      - ${PLATFORM_DATA_ROOT:?set PLATFORM_DATA_ROOT in platform.env}/bisque-data:/source/data
      - ${PLATFORM_DATA_ROOT:?set PLATFORM_DATA_ROOT in platform.env}/bisque-reports:/source/reports
      - ${PLATFORM_DATA_ROOT:?set PLATFORM_DATA_ROOT in platform.env}/bisque-public:/source/public
      - ./modules:/source/modules:ro
      - ${PLATFORM_DATA_ROOT:?set PLATFORM_DATA_ROOT in platform.env}/bisque-staging:/source/staging
    environment:
      - BISQUE_SERVER=${BISQUE_SERVER:?set BISQUE_SERVER in platform.env}
      - BISQUE_DBURL=${BISQUE_DBURL:?set BISQUE_DBURL in platform.env}
      - BISQUE_AUTH_MODE=${BISQUE_AUTH_MODE:-dual}
      - BISQUE_AUTH_LOCAL_TOKEN_ENABLED=${BISQUE_AUTH_LOCAL_TOKEN_ENABLED:-true}
      - BISQUE_OIDC_ISSUER=${BISQUE_OIDC_ISSUER:?set BISQUE_OIDC_ISSUER in platform.env}
      - BISQUE_OIDC_METADATA_URL=${BISQUE_OIDC_METADATA_URL:?set BISQUE_OIDC_METADATA_URL in platform.env}
      - BISQUE_OIDC_JWKS_URI=${BISQUE_OIDC_JWKS_URI:?set BISQUE_OIDC_JWKS_URI in platform.env}
      - BISQUE_OIDC_AUTHORIZATION_ENDPOINT=${BISQUE_OIDC_AUTHORIZATION_ENDPOINT:?set BISQUE_OIDC_AUTHORIZATION_ENDPOINT in platform.env}
      - BISQUE_OIDC_TOKEN_ENDPOINT=${BISQUE_OIDC_TOKEN_ENDPOINT:?set BISQUE_OIDC_TOKEN_ENDPOINT in platform.env}
      - BISQUE_OIDC_END_SESSION_ENDPOINT=${BISQUE_OIDC_END_SESSION_ENDPOINT:?set BISQUE_OIDC_END_SESSION_ENDPOINT in platform.env}
      - BISQUE_OIDC_USERINFO_ENDPOINT=${BISQUE_OIDC_USERINFO_ENDPOINT:?set BISQUE_OIDC_USERINFO_ENDPOINT in platform.env}
      - BISQUE_OIDC_CLIENT_ID=${BISQUE_OIDC_CLIENT_ID:?set BISQUE_OIDC_CLIENT_ID in platform.env}
      - BISQUE_OIDC_CLIENT_SECRET=${BISQUE_OIDC_CLIENT_SECRET:?set BISQUE_OIDC_CLIENT_SECRET in platform.env}
      - BISQUE_OIDC_REDIRECT_URI=${BISQUE_OIDC_REDIRECT_URI:?set BISQUE_OIDC_REDIRECT_URI in platform.env}
      - BISQUE_OIDC_POST_LOGOUT_REDIRECT_URI=${BISQUE_OIDC_POST_LOGOUT_REDIRECT_URI:?set BISQUE_OIDC_POST_LOGOUT_REDIRECT_URI in platform.env}
      - BISQUE_SQLALCHEMY_POOL_RECYCLE=${BISQUE_SQLALCHEMY_POOL_RECYCLE:-3600}
      - BISQUE_SQLALCHEMY_POOL_PRE_PING=${BISQUE_SQLALCHEMY_POOL_PRE_PING:-true}
      - BISQUE_SQLALCHEMY_POOL_SIZE=${BISQUE_SQLALCHEMY_POOL_SIZE:-25}
      - BISQUE_SQLALCHEMY_MAX_OVERFLOW=${BISQUE_SQLALCHEMY_MAX_OVERFLOW:-25}
      - BISQUE_SQLALCHEMY_POOL_TIMEOUT=${BISQUE_SQLALCHEMY_POOL_TIMEOUT:-60}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  postgres:
    ports: !override
      - "${PLATFORM_DB_BIND_HOST:-127.0.0.1}:${BISQUE_POSTGRES_PORT:-55433}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in platform.env}
      BISQUE_DB_NAME: ${BISQUE_DB_NAME:-bisque}
      BISQUE_DB_USER: ${BISQUE_DB_USER:-bisque}
      BISQUE_DB_PASSWORD: ${BISQUE_DB_PASSWORD:?set BISQUE_DB_PASSWORD in platform.env}
      KEYCLOAK_DB_DATABASE: ${KEYCLOAK_DB_DATABASE:-keycloak}
      KEYCLOAK_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD in platform.env}
      ULTRA_DB_DATABASE: ${ULTRA_DB_DATABASE:-ultra}
      ULTRA_DB_USERNAME: ${ULTRA_DB_USERNAME:-ultra}
      ULTRA_DB_PASSWORD: ${ULTRA_DB_PASSWORD:?set ULTRA_DB_PASSWORD in platform.env}
    volumes:
      - ${PLATFORM_DATA_ROOT:?set PLATFORM_DATA_ROOT in platform.env}/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: bisque-keycloak
    command:
      - start
      - --import-realm
      - --http-enabled=true
      - --proxy-headers=xforwarded
      - --hostname=${AUTH_PUBLIC_HOST:?set AUTH_PUBLIC_HOST in platform.env}
      - --http-relative-path=${KEYCLOAK_HTTP_RELATIVE_PATH:-/}
      - --hostname-strict=true
      - --spi-theme-static-max-age=86400
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:?set KEYCLOAK_ADMIN in platform.env}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD in platform.env}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_DATABASE:-keycloak}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USERNAME:-keycloak}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD in platform.env}
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME=${AUTH_PUBLIC_HOST:?set AUTH_PUBLIC_HOST in platform.env}
    ports:
      - "${PLATFORM_BIND_HOST:-127.0.0.1}:${KEYCLOAK_PORT:-18080}:8080"
    volumes:
      - ./docker/keycloak/realm-bisque-dev.json:/opt/keycloak/data/import/realm-bisque-dev.json:ro
      - ./docker/keycloak/themes:/opt/keycloak/themes:ro
      - ${PLATFORM_DATA_ROOT:?set PLATFORM_DATA_ROOT in platform.env}/keycloak:/opt/keycloak/data
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bisque-net

  mysql:
    profiles:
      - disabled
