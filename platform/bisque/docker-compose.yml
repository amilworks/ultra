volumes:
  # Named volumes for persistent data
  bisque_config:
    driver: local
  bisque_data:
    driver: local
  bisque_reports:
    driver: local
  bisque_public:
    driver: local
  bisque_modules:
    driver: local
  bisque_staging:
    driver: local
  # postgres_data:
  #   driver: local

networks:
  bisque-net:
    name: ${NETWORK_NAME:-bisque-network}
    driver: bridge
