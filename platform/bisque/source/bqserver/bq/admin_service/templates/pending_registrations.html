<body>
  <div class="pending-registrations">
    <h1>User Approvals</h1>
    
    <div class="card">
      <div class="card-header">
        <h3>Users Awaiting Verification</h3>
        <div class="header-actions">
          <a href="/admin/domain_management" class="btn btn-secondary">Manage Domains</a>
          <button class="btn btn-secondary" onclick="refreshRegistrations()">Refresh</button>
        </div>
      </div>
      <div class="card-body">
        <div id="registrationTableContainer">
          <table class="table" id="registrationTable">
            <thead>
              <tr>
                <th>Email</th>
                <th>Full Name</th>
                <th>Request Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    //<![CDATA[
    // Pending registrations functionality
    document.addEventListener('DOMContentLoaded', function() {
      loadPendingRegistrations();
    });

    function loadPendingRegistrations() {
      fetch('/admin/pending_list')
        .then(function(response) { return response.json(); })
        .then(function(data) {
          if (data.status === 'success') {
            displayRegistrations(data.registrations);
          } else {
            Ext.Msg.alert('Error', 'Error loading pending registrations: ' + data.message);
          }
        })
        .catch(function(error) {
          console.error('Error:', error);
          Ext.Msg.alert('Error', 'Error loading pending registrations');
        });
    }

    function displayRegistrations(registrations) {
      // Destroy existing DataTable if it exists
      if (window.registrationDataTable) {
        window.registrationDataTable.destroy();
      }
      
      // Prepare data for DataTables
      var tableData = [];
      for (var i = 0; i < registrations.length; i++) {
        var reg = registrations[i];
        
        var statusSpan = document.createElement('span');
        statusSpan.className = 'status-' + (reg.status || 'pending');
        statusSpan.textContent = reg.status || 'pending';
        
        var actions = '';
        if (reg.status === 'pending') {
          actions = '<div class="tooltip"><button class="btn-icon btn-icon-success approve-btn" data-user-id="' + reg.id + '" title="Approve Registration"></button><span class="tooltip-text">Approve Registration</span></div> ' +
                   '<div class="tooltip"><button class="btn-icon btn-icon-danger reject-btn" data-user-id="' + reg.id + '" title="Reject Registration"></button><span class="tooltip-text">Reject Registration</span></div>';
        } else {
          actions = '<span>No actions available</span>';
        }
        
        tableData.push([
          reg.email || '',
          reg.full_name || '',
          reg.created_date ? new Date(reg.created_date).toLocaleDateString() : '',
          statusSpan.outerHTML,
          actions
        ]);
      }
      
      // Initialize DataTable
      window.registrationDataTable = $('#registrationTable').DataTable({
        data: tableData,
        columns: [
          { title: 'Email' },
          { title: 'Full Name' },
          { title: 'Request Date' },
          { title: 'Status', orderable: false },
          { title: 'Actions', orderable: false }
        ],
        responsive: true,
        pageLength: 10,
        language: {
          emptyTable: 'No pending registrations'
        }
      });
      
      // Add event delegation for approve/reject buttons
      $('#registrationTable').off('click', '.approve-btn, .reject-btn');
      $('#registrationTable').on('click', '.approve-btn', function(e) {
        e.preventDefault();
        var userId = $(this).data('user-id');
        approveRegistration(userId);
      });
      
      $('#registrationTable').on('click', '.reject-btn', function(e) {
        e.preventDefault();
        var userId = $(this).data('user-id');
        rejectRegistration(userId);
      });
    }

    function approveRegistration(registrationId) {
      console.log('Approving registration ID:', registrationId);
      
      Ext.Msg.confirm('Confirm Approval', 'Are you sure you want to approve this registration?', function(btn) {
        if (btn === 'yes') {
          fetch('/admin/registration_approve', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({registration_id: registrationId})
          })
          .then(function(response) { 
            console.log('Approve response:', response);
            return response.json(); 
          })
          .then(function(result) {
            console.log('Approve result:', result);
            if (result.status === 'success') {
              Ext.Msg.alert('Success', 'Registration approved successfully');
              loadPendingRegistrations();
            } else {
              Ext.Msg.alert('Error', 'Error approving registration: ' + result.message);
            }
          })
          .catch(function(error) {
            console.error('Error:', error);
            Ext.Msg.alert('Error', 'Error approving registration');
          });
        }
      });
    }

    function rejectRegistration(registrationId) {
      console.log('Rejecting registration ID:', registrationId);
      
      Ext.Msg.confirm('Confirm Rejection', 'Are you sure you want to reject this registration? The user will be completely deleted from the database.', function(btn) {
        if (btn === 'yes') {
          fetch('/admin/registration_reject', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              registration_id: registrationId
            })
          })
          .then(function(response) { 
            console.log('Reject response:', response);
            return response.json(); 
          })
          .then(function(result) {
            console.log('Reject result:', result);
            if (result.status === 'success') {
              Ext.Msg.alert('Success', 'Registration rejected successfully');
              loadPendingRegistrations();
            } else {
              Ext.Msg.alert('Error', 'Error rejecting registration: ' + result.message);
            }
          })
          .catch(function(error) {
            console.error('Error:', error);
            Ext.Msg.alert('Error', 'Error rejecting registration');
          });
        }
      });
    }

    function refreshRegistrations() {
      loadPendingRegistrations();
    }
    //]]>
  </script>
  
  <!-- jQuery and DataTables JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</body>
